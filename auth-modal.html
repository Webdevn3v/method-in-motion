<div id="auth-modal" class="auth-modal-overlay" role="dialog" aria-modal="true" aria-label="Sign in or create account">
  <div class="auth-modal-box">

    <!-- Close -->
    <button class="auth-close" id="auth-close-btn" aria-label="Close">&times;</button>

    <!-- Header -->
    <div class="auth-modal-header">
      <div class="auth-logo-mark">MiM</div>
      <p class="auth-tagline">Create. Don't Consume.</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Log In</button>
      <button class="auth-tab" data-tab="signup">Join the Crew</button>
    </div>

    <!-- Login Form -->
    <div id="login-form" class="auth-form active">
      <div class="auth-field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="auth-field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p class="auth-error" id="login-error"></p>
      <button class="auth-submit" id="login-submit-btn">Log In</button>
      <p class="auth-switch">New here? <button class="auth-link" data-tab="signup">Join the Crew</button></p>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" class="auth-form">
      <p class="auth-free-note">Free account — no card needed</p>
      <div class="auth-field">
        <label for="signup-name">Display Name</label>
        <input type="text" id="signup-name" placeholder="What should we call you?" autocomplete="nickname" />
      </div>
      <div class="auth-field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="auth-field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="6+ characters" autocomplete="new-password" />
      </div>
      <p class="auth-error" id="signup-error"></p>
      <button class="auth-submit" id="signup-submit-btn">Create Account</button>
      <p class="auth-switch">Already in the crew? <button class="auth-link" data-tab="login">Log In</button></p>
    </div>

  </div>
</div>
